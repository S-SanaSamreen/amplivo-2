services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: amplivo-backend
    runtime: python
    rootDir: Backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres.fhxkiprlcdwbgtaxlffk:Shivanigoud%400918@aws-0-ap-south-1.pooler.supabase.com:6543/postgres
      - key: DB_SSL_MODE
        value: require
      - key: DB_POOL_SIZE
        value: 3
      - key: DB_MAX_OVERFLOW
        value: 5
      - key: DB_STARTUP_TIMEOUT_SECONDS
        value: 10.0
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: BCRYPT_ROUNDS
        value: 12
      - key: CORS_ORIGINS
        value: https://amplivo-2.vercel.app,http://localhost:3000
      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: 5
      - key: ACCOUNT_LOCK_MINUTES
        value: 15
      - key: RATE_LIMIT_LOGIN_PER_MINUTE
        value: 20
      - key: RATE_LIMIT_REGISTER_PER_MINUTE
        value: 10
      - key: RATE_LIMIT_REFRESH_PER_MINUTE
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  - type: web
    name: amplivo-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://amplivo-2.onrender.com/api/v1
